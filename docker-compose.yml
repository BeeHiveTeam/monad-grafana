services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    restart: unless-stopped
    user: "65534:65534"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.listen-address=0.0.0.0:9090'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks: [monitoring]
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    restart: unless-stopped
    user: "472:472"
    depends_on: [prometheus]
    env_file:
      - path: .env
        required: false
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?run install.sh or set in .env}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=http://localhost:3000/
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      # Bind interface controlled via GRAFANA_BIND in .env:
      #   127.0.0.1 (default, SSH-tunnel access only — safer)
      #   0.0.0.0   (public LAN/internet access — install.sh --public sets this)
      - "${GRAFANA_BIND:-127.0.0.1}:3000:3000"
    networks: [monitoring]
    mem_limit: 512m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # node_exporter — Prometheus standard for host-level metrics.
  # Required because docs.monad.xyz mandates the Core `otelcol` distribution
  # (no hostmetrics receiver). Runs with network_mode: host + pid: host so
  # /proc reads see the real host kernel, not the container namespace.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    network_mode: host
    command:
      # Mount host root readonly; rootfs flag tells the collector where to read.
      - --path.rootfs=/host
      - --collector.systemd
      # Reduce noise: ignore cgroup-internal mounts / virtual filesystems.
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$
      # NIC stats from /sys/class/net.
      - --collector.netdev
      # Disk I/O — critical for TrieDB performance visibility.
      - --collector.diskstats
      # Listen on 0.0.0.0:9100. With network_mode: host, this is the host's
      # network namespace — binding to 127.0.0.1 here would mean Prometheus
      # (which scrapes via docker-bridge → host-gateway IP, not loopback)
      # cannot reach us. setup_ufw() in install.sh adds an allow rule
      # restricted to the monitoring bridge subnet, so :9100 stays unreachable
      # from the public internet while remaining scrape-able from Prometheus.
      - --web.listen-address=0.0.0.0:9100
    volumes:
      - /:/host:ro,rslave
    mem_limit: 64m
    cpus: 0.1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  monad-rpc-exporter:
    image: python:3.12-alpine
    container_name: monad-rpc-exporter
    restart: unless-stopped
    user: "65534:65534"
    pid: host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./exporter:/app:ro
    command: ["python", "/app/exporter.py"]
    environment:
      - LOCAL_RPC_URL=${LOCAL_RPC_URL:-http://host.docker.internal:8080}
      - PUBLIC_RPC_URL=${PUBLIC_RPC_URL:-https://testnet-rpc.monad.xyz}
    ports:
      - "127.0.0.1:9101:9101"
    networks: [monitoring]
    mem_limit: 64m
    cpus: 0.1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
