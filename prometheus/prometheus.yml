global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # external_labels apply only to federation / remote_write — they do NOT
  # show up in local /api/v1/query results. We duplicate `network` into
  # each job's static_configs[].labels below so it's available to
  # dashboards as a normal scrape-time label.
  external_labels:
    host: monad-node
    network: testnet

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['127.0.0.1:9090']
        labels:
          # network label is rewritten in-place by install.sh:configure_prometheus
          # whenever it changes (auto-detected from chain_id, or NETWORK env override).
          network: testnet

  # Monad's bundled OTel collector exposes Prometheus-format metrics on :8889.
  # Make sure UFW allows the docker-bridge subnet to reach this port.
  - job_name: monad-otelcol
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8889']
        labels:
          source: otelcol
          network: testnet

  # Sidecar that polls JSON-RPC for block height + reads /proc for service uptime.
  - job_name: monad-rpc-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ['monad-rpc-exporter:9101']
        labels:
          source: rpc-exporter
          network: testnet

  # node_exporter — host-level metrics (CPU/RAM/disk/network/filesystems).
  # The node-exporter container runs network_mode: host bound to 127.0.0.1:9100.
  # Reach it from inside the monitoring bridge network via the host-gateway alias.
  - job_name: node-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          source: node-exporter
          network: testnet
