global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    # Set these via $HOSTNAME / customize per-deployment.
    host: monad-node
    network: testnet

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['127.0.0.1:9090']

  # Monad's bundled OTel collector exposes Prometheus-format metrics on :8889.
  # Make sure UFW allows the docker-bridge subnet to reach this port.
  - job_name: monad-otelcol
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8889']
        labels:
          source: otelcol

  # Sidecar that polls JSON-RPC for block height + reads /proc for service uptime.
  - job_name: monad-rpc-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ['monad-rpc-exporter:9101']
        labels:
          source: rpc-exporter

  # node_exporter — host-level metrics (CPU/RAM/disk/network/filesystems).
  # The node-exporter container runs network_mode: host bound to 127.0.0.1:9100.
  # Reach it from inside the monitoring bridge network via the host-gateway alias.
  - job_name: node-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          source: node-exporter
