groups:
  - name: monad-connectivity
    rules:
      # The failure that the old "Active peers" panel hid: discovery keeps
      # reporting hundreds of known peers while live wireauth sessions collapse,
      # so the node is effectively isolated but the dashboard looks fine.
      - alert: MonadPeerSessionsCollapsed
        expr: monad_wireauth_udp_state_transport_sessions < 5
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Monad node has <5 live peer sessions ({{ $value }})"
          description: >-
            transport_sessions={{ $value }} for 10m. These are fully established
            wireauth sessions (actual connections). Known-via-discovery peers can
            stay high while this collapses — that is the masked-outage signature.
            Tune the threshold to your network's normal session count.

      # Explicit divergence detector: many known peers, almost no real sessions.
      - alert: MonadPeersKnownButDisconnected
        expr: monad_peer_disc_num_peers > 50 and monad_wireauth_udp_state_transport_sessions < 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Monad node knows many peers but is not connected to them"
          description: >-
            num_peers={{ with query "monad_peer_disc_num_peers" }}{{ . | first | value }}{{ end }}
            but transport_sessions<5. Discovery routing table is populated while
            live sessions are gone — the node is isolated.

      # Scrape target down — metrics stopped flowing entirely.
      - alert: MonadOtelcolDown
        expr: up{job="monad-otelcol"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Monad otelcol metrics endpoint is down"
          description: "Prometheus cannot scrape host.docker.internal:8889 for 3m."

      # Upstream validators are the peers that feed this full-node proposals.
      # Below ~3 a full-node risks the "local timeout deadlock" (stops receiving
      # proposals, freezes, can't self-recover). This is the FUNCTIONAL signal —
      # more reliable than raw session count, which bursts/prunes around restarts.
      - alert: MonadUpstreamValidatorsLow
        expr: monad_peer_disc_num_upstream_validators < 3
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Monad node has <3 upstream validators ({{ $value }})"
          description: >-
            num_upstream_validators={{ $value }} for 15m. Below ~3 a full-node
            can stop receiving proposals and hit the local-timeout deadlock that
            only a restart recovers. Tune to your network's healthy value.

      # Session working-set collapsed toward single digits (but not yet <5).
      # Catches a genuine decay BEFORE it trips the <5 MonadPeerSessionsCollapsed
      # critical. Threshold 15 sits below the observed stable working set on
      # 0.14.5 (~28-42) but above the degraded ~7-10 seen before a recovery
      # restart, so it fires on a real collapse, not on the normal level.
      # 30m for: avoids the legitimate post-restart prune from the burst peak.
      - alert: MonadPeerSessionsDecayed
        expr: monad_wireauth_udp_state_transport_sessions < 15
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Monad live peer sessions decayed to {{ $value }} (recovery restart usually helps)"
          description: >-
            transport_sessions={{ $value }} for 30m, below this node's healthy
            working set. Signal of a peering/session-management slide toward
            isolation; a monad-bft restart typically restores it. If it recurs,
            report it. Tune the threshold (15) to your node's observed baseline.
